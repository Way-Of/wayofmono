regulations:
  - title: "ID06 — Mandatory Construction ID System"
    description: "Electronic personnel register mandatory on all Swedish construction sites since 2016. 700,000+ valid cards, ~1,500 new applications daily. New security requirements from Jan 2026: passport/national ID scanning via mobile app required for all card applications. Owner organizations: Byggföretagen, Byggherrarna, Fastighetsägarna, Installatörsföretagen."
    source: "id06.se, codexgroup.se, arlettipartners.com, 1office.co"
    impact: "Drives demand for digital workforce management, compliance tracking, and document verification software on construction sites"

  - title: "AFS 2023:3 — Construction Work Environment"
    description: "New Swedish Work Environment Authority provisions effective Jan 2025. Replaces AFS 1999:3. New requirements clarifying responsibilities for builders, designers, and construction coordinators, especially in early construction stages. Part of broader restructuring of 67 provisions into 15."
    source: "av.se — Swedish Work Environment Authority; leglobal.law; kund.falcksverige.se"
    impact: "Forces adoption of digital compliance and safety documentation tools; creates regulatory tailwind for construction software"

  - title: "EU BIM Mandate / Public Procurement"
    description: "Sweden participates in EU BIM Task Group. Nordic countries (incl. Sweden) are among most advanced in public sector BIM requirements. EU-level push for BIM in public infrastructure procurement."
    source: "eubim.eu — EU BIM Task Group Survey Report 2024; bmv.de — Road Map for Digital Design and Construction"
    impact: "Creates minimum digital capability requirements for contractors bidding on public projects, driving BIM software adoption"

  - title: "AB 25 / ABT 25 — New Standard Contracts"
    description: "New Swedish standard construction contracts replacing AB 04 and ABT 06. Expected publication summer 2025 after referral process since 2016. Major structural changes: replaces ÄTA with 'Amendment of contract', new risk transfer provisions, updated purchaser rights."
    source: "lindahl.se — Advokatfirman Lindahl construction law seminar Nov 2024"
    impact: "Changes to contract structures, risk allocation, and change order management will require software updates for Swedish contractors"

  - title: "National Infrastructure Plan 2026-2037"
    description: "SEK 354B ($33.5B) for road infrastructure, SEK 210B ($19.9B) for rail maintenance by 2037. Grid Development Plan 2024-2033: 1,500km new transmission lines, 30 substations."
    source: "ResearchAndMarkets — Sweden Construction Industry Report 2025"
    impact: "Massive public infrastructure spending creates demand for construction software across project lifecycle — planning, design, project management, compliance"

  - title: "Smart Built Environment — Government Digitalization Program"
    description: "Government-backed consortium exploring fully digital construction process. Partners represent 20% of Swedish residential development and $10B+ turnover. Supported by Research Council Formas and Swedish National Board of Housing."
    source: "bygg40.se — Bygg 4.0 consortium; linkedin.com/company/bygg-4-0"
    impact: "Government commitment to digitalization creates policy tailwind for ConTech adoption; consortium validates market need"

market_trends:
  - title: "AI Dominates ConTech Investment"
    description: "46% of all ConTech funding in Q1 2025 went to AI companies ($3.55B in single quarter). AI in construction expected to grow from $1.3B (2022) to $13.5B by 2030. Swedish ConTech startups (Endra, Brickanta, AI-BOB) all AI-native."
    source: "AEC Hub 2025 Research Report, aechub.org; nymblventures.com Q3 2025 ConTech Report; ArcticStartup, EU-Startups"

  - title: "Swedish ConTech Ecosystem Maturing Rapidly"
    description: "Endra raised from pre-seed to Series A ($73M total) in 13 months. Brickanta raised $8M Seed led by Northzone with angels from OpenAI/Google/Meta. AI-BOB reached €10M+ valuation in first year. Q1 2026 ConTech funding up 21.73% over 2025."
    source: "Bricks & Bytes (bricks-bytes.com), ArcticStartup, EU-Startups, Tracxn"

  - title: "Cloud-First Becomes Default"
    description: "62.35% of construction management software is cloud-based, growing at 12.08% CAGR. Swedish ICT market growing at 8.8% CAGR to 2032 with cloud as primary driver. SaaS delivery model expected to dominate."
    source: "AEC Hub 2025; Trade Commissioner Canada — Sweden ICT Market 2026"

  - title: "Digital Divide Deepening"
    description: "Adopters vs non-adopters increasingly diverging. Average construction firm uses 6.2 of 16 digital technologies (up 20%). SMEs face highest adoption barriers — cost, skills gap, lack of client demand. Key opportunity for accessible, low-friction solutions."
    source: "RICS Digitalisation in Construction Report 2024; Deloitte State of Digital Adoption 2025; MDPI BIM Adoption Study 2025"

  - title: "Sustainability Mandates Driving Digitalization"
    description: "Sweden targets 65% renewable electricity by 2030, 100% fossil-free by 2040. SEK 220B ($21B) in government loans for nuclear reactors. Green building materials market projected $1.37T by 2034. LEED v5 launched April 2025. Digital tools required for carbon reporting and compliance."
    source: "ResearchAndMarkets Sweden Construction Report; government announcements via SCB; AEC Hub 2025"

  - title: "Labor Crisis Accelerating Tech Adoption"
    description: "439K new AEC workers needed globally in 2025, 1.9M over next decade. Sweden has tens of thousands of unfilled digital jobs. 80% of construction firms are self-employed or <3 employees. Fragmented market needs accessible tech solutions."
    source: "AEC Hub 2025; Nymbl Ventures Q3 2025 ConTech Report; Trade Commissioner Canada — Sweden ICT Market"

  - title: "Sweden as ConTech Testbed"
    description: "Sweden has 30+ testbeds for AI, IoT, 5G/6G. Strong VC ecosystem (Northzone, Norrsken, Creandum). ICT contributes 4.7% of GDP, 40% of Nordic ICT market. Early adopter culture and high English proficiency enable rapid scaling."
    source: "Trade Commissioner Canada — Sweden ICT Market 2026; Swedish Tech News; eu-startups.com"

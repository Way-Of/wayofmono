project_name: "OptiCat"
project_tagline: "AI-powered HVAC optimization platform"
project_description: "OptiCat is an intelligent HVAC optimization platform that uses AI to reduce energy consumption, predict maintenance needs, and optimize building climate systems in real-time."

problem_statement: "Commercial HVAC systems account for 40% of building energy use, yet most operate on reactive maintenance and static schedules. Building managers lack the tools to optimize performance, predict failures, or reduce energy costs without expensive retrofits."
problem_details:
  - title: "Energy Waste"
    description: "Commercial buildings waste 30% of HVAC energy due to suboptimal scheduling and lack of real-time optimization."
  - title: "Reactive Maintenance"
    description: "70% of HVAC failures are unplanned, causing tenant discomfort and expensive emergency repairs."
  - title: "Complex Controls"
    description: "Modern HVAC systems have dozens of parameters, making manual optimization impractical."
  - title: "No Predictive Analytics"
    description: "Building managers lack AI-driven insights to anticipate issues before they occur."

solution_description: "OptiCat connects to existing HVAC infrastructure via IoT sensors and BMS APIs, applying ML models that continuously optimize temperature setpoints, airflow, and scheduling. Our platform predicts equipment failures 7+ days in advance and provides actionable recommendations through an intuitive dashboard."
solution_highlights:
  - title: "AI-Driven Optimization"
    description: "ML models continuously learn building thermal dynamics and optimize HVAC parameters in real-time."
  - title: "Predictive Maintenance"
    description: "Detect equipment anomalies 7+ days before failure with 95% accuracy."
  - title: "Fault Detection"
    description: "Automatically identify and diagnose HVAC faults, reducing diagnostic time by 80%."
  - title: "Energy Reporting"
    description: "Comprehensive energy analytics with automated reporting and carbon footprint tracking."


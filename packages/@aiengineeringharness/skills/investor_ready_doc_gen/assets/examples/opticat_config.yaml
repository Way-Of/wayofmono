architecture_description: "OptiCat uses a microservices architecture with event-driven data pipeline. IoT data ingestion via MQTT brokers, real-time processing with Apache Flink, ML inference via TensorFlow Serving, and REST/GraphQL API for the frontend. PostgreSQL for operational data, TimescaleDB for time-series data."

core_components:
  - name: "Data Ingestion Engine"
    purpose: "Collect and normalize HVAC sensor data from multiple protocols"
    description: "Connects to BMS systems via BACnet, Modbus, and IoT sensors via MQTT. Normalizes data into common schema."
    features: ["BACnet/IP support", "MQTT broker", "Data normalization", "Edge caching"]
    technical_details: "Go-based ingestion service handling 10K+ data points per second"
  - name: "ML Optimization Engine"
    purpose: "Optimize HVAC parameters using trained models"
    description: "Continuous learning models that predict optimal setpoints based on weather, occupancy, and energy prices."
    features: ["Reinforcement learning", "Weather integration", "Occupancy prediction", "Price optimization"]
    technical_details: "Ensemble of XGBoost and DRL models, retrained weekly"
  - name: "Predictive Maintenance"
    purpose: "Predict equipment failures before they occur"
    description: "Anomaly detection on equipment vibration, temperature, and current draw patterns."
    features: ["7-day failure prediction", "Root cause analysis", "Maintenance scheduling"]
    technical_details: "LSTM autoencoders with 95% failure prediction accuracy"
  - name: "Analytics Dashboard"
    purpose: "Visualize energy usage, savings, and recommendations"
    description: "Real-time and historical analytics with automated reporting."
    features: ["Energy benchmarking", "Carbon tracking", "Automated reports", "Alerting"]

api_endpoints:

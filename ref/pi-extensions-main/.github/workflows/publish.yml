name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Package name to publish (e.g. pi-continuous-learning)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Resolve package path
        id: pkg
        env:
          TAG: ${{ github.event.release.tag_name }}
          DISPATCH_PKG: ${{ inputs.package }}
        run: |
          if [ -n "${DISPATCH_PKG}" ]; then
            PKG_PATH="packages/${DISPATCH_PKG}"
          else
            PKG_NAME="${TAG%-v*}"
            PKG_PATH="packages/${PKG_NAME}"
          fi
          if [ ! -d "${PKG_PATH}" ]; then
            echo "Error: package directory '${PKG_PATH}' not found"
            exit 1
          fi
          echo "path=${PKG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: ${{ steps.pkg.outputs.path }}
        run: npm run build --if-present

      - name: Run checks
        working-directory: ${{ steps.pkg.outputs.path }}
        run: npm run check

      - name: Verify dist exists
        working-directory: ${{ steps.pkg.outputs.path }}
        run: |
          if [ ! -d dist ]; then
            echo "Error: dist/ directory missing after build step"
            exit 1
          fi

      - name: Publish
        working-directory: ${{ steps.pkg.outputs.path }}
        run: npm publish --provenance --access public --ignore-scripts
